name: Daily Agent Papers

on:
  schedule:
    # 09:30 Asia/Hong_Kong. Run after the local daily paper automation window.
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Update Daily Paper data
        run: npm run papers:daily

      - name: Build site
        run: npm run build

      - name: Commit source data and built assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/assets/content/data/daily-papers.json dist/assets/content/data/daily-papers.json dist/index.html dist/css/style.css dist/js/main.js
          if git diff --cached --quiet; then
            echo "No daily paper changes."
          else
            git commit -m "chore: update daily agent papers"
            git push
          fi

      - name: Deploy dist to GitHub Pages
        run: |
          git fetch origin gh-pages
          rm -rf /tmp/homepage-gh-pages
          git worktree add /tmp/homepage-gh-pages origin/gh-pages -b gh-pages-deploy
          git -C /tmp/homepage-gh-pages rm -r --ignore-unmatch .
          cp -R dist/. /tmp/homepage-gh-pages/
          git -C /tmp/homepage-gh-pages add -A
          if git -C /tmp/homepage-gh-pages diff --cached --quiet; then
            echo "No GitHub Pages changes."
          else
            git -C /tmp/homepage-gh-pages commit -m "deploy: update daily agent papers"
            git -C /tmp/homepage-gh-pages push origin HEAD:gh-pages
          fi
          git worktree remove /tmp/homepage-gh-pages
